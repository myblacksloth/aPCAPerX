# ─── PCAPCaper — Docker Compose ───────────────────────────────────────────────
#
# Avvia l'intera applicazione con un solo comando:
#   docker-compose up --build
#
# Servizi:
#   db        → PostgreSQL utenti/sessioni/passkeys
#   backend   → FastAPI + Scapy, porta 8000
#   frontend  → React (build Nginx), porta 3000
#   ai        → Ollama model server, rete interna soltanto
#
# Rete interna: i due container comunicano tramite la rete "pcapcaper_net".
# Nginx risolve l'hostname "backend" automaticamente grazie a Docker DNS.
# ──────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    container_name: pcapcaper-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${PCAPCAPER_POSTGRES_DB:-pcapcaper}
      - POSTGRES_USER=${PCAPCAPER_POSTGRES_USER:-pcapcaper}
      - POSTGRES_PASSWORD=${PCAPCAPER_POSTGRES_PASSWORD:-pcapcaper}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./stuff/db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - pcapcaper_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Servizio AI leggero (Ollama) ───────────────────────────────────────
  ai:
    image: ollama/ollama:latest
    container_name: pcapcaper-ai
    restart: unless-stopped

    # The model is selected through .env and must be pulled once, for example:
    # docker compose exec ai ollama pull qwen2.5:0.5b
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=0.0.0.0:11434

    # Conservative defaults for Raspberry Pi 5 / 4 GB RAM. Increase these
    # values on stronger hardware if you want faster local inference.
    cpus: "1.0"
    mem_limit: 3g

    volumes:
      - ollama_models:/root/.ollama

    networks:
      - pcapcaper_net

    healthcheck:
      test: ["CMD-SHELL", "OLLAMA_HOST=http://127.0.0.1:11434 ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  # ── Download automatico del modello configurato ───────────────────────
  ai-model-pull:
    image: python:3.11-slim
    container_name: pcapcaper-ai-model-pull
    restart: "no"
    env_file:
      - .env
    command: ["python", "/opt/pcapcaper/pull_ollama_model.py"]
    volumes:
      - ./stuff/scripts/pull_ollama_model.py:/opt/pcapcaper/pull_ollama_model.py:ro
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_healthy
    networks:
      - pcapcaper_net

  # ── Servizio Backend (FastAPI) ──────────────────────────────────────────
  backend:
    build:
      context: ./backend      # usa il Dockerfile in backend/
      dockerfile: Dockerfile
    container_name: pcapcaper-backend
    restart: unless-stopped

    # Espone la porta del backend all'host (utile per test diretti con curl/Postman)
    ports:
      - "8000:8000"

    # Variabili d'ambiente lette dal backend (opzionali — usano già i default)
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1   # disabilita il buffering di Python per i log in tempo reale

    # Storage temporaneo per upload PCAP. Docker lo elimina allo stop del container;
    # l'app cancella comunque ogni file alla fine della richiesta.
    tmpfs:
      - /tmp/pcapcaper:size=2g,mode=1777
    volumes:
      - analysis_reports:/data/pcapcaper/analyses

    # Connette il container alla rete interna
    networks:
      - pcapcaper_net

    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_healthy

    # Health-check: verifica che il backend risponda prima che il frontend parta
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s


  # ── Servizio Frontend (React + Nginx) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pcapcaper-frontend
    restart: unless-stopped

    # Porta dell'interfaccia web — aprire http://localhost:3000 nel browser
    ports:
      - "3000:80"

    # Il frontend dipende dal backend: Docker attende che il health-check passi
    depends_on:
      backend:
        condition: service_healthy

    networks:
      - pcapcaper_net


# ── Rete interna condivisa tra i due container ──────────────────────────
networks:
  pcapcaper_net:
    driver: bridge

volumes:
  ollama_models:
  analysis_reports:
  postgres_data:
