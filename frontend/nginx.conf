# ─── Configurazione Nginx per il container frontend Docker ────────────────────
#
# Nginx svolge due ruoli:
#   1. Serve i file statici della build React (HTML, JS, CSS)
#   2. Proxy-izza le chiamate /api/* al container backend FastAPI
#
# Il nome host "backend" fa riferimento al servizio definito in docker-compose.yml.
# Docker Compose risolve automaticamente questo nome tramite la rete interna.

server {
    listen 80;
    server_name _;

    # Directory contenente i file statici generati da `npm run build`
    root /usr/share/nginx/html;
    index index.html;

    # ── Compressione Gzip ──────────────────────────────────────────────────
    # Riduce il peso dei file JS/CSS inviati al browser
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ── File statici e SPA fallback ────────────────────────────────────────
    # Per ogni URL prova prima il file esatto, poi la directory,
    # infine cade su index.html per consentire il routing lato client React.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy verso il backend ─────────────────────────────────────────────
    # Tutte le richieste che iniziano con /api vengono inoltrate a FastAPI.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        # Intestazioni necessarie per il corretto funzionamento del proxy
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout generoso per l'analisi di file PCAP grandi
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Disabilita il buffering per la risposta JSON (trasferimento diretto)
        proxy_buffering off;

        # Limite dimensione upload allineato con il backend (100 MB)
        client_max_body_size 110m;
    }
}
