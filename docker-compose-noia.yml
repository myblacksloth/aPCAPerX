# ─── PCAPCaper — Docker Compose ───────────────────────────────────────────────
#
# Avvia l'intera applicazione con un solo comando:
#   docker-compose up --build
#
# Servizi:
#   db        → PostgreSQL utenti/sessioni/passkeys
#   backend   → FastAPI + Scapy, porta 8000
#   frontend  → React (build Nginx), porta 3000
#   nessun servizio AI/Ollama
#
# Rete interna: i due container comunicano tramite la rete "pcapcaper_net".
# Nginx risolve l'hostname "backend" automaticamente grazie a Docker DNS.
# ──────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    container_name: pcapcaper-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${PCAPCAPER_POSTGRES_DB:-pcapcaper}
      - POSTGRES_USER=${PCAPCAPER_POSTGRES_USER:-pcapcaper}
      - POSTGRES_PASSWORD=${PCAPCAPER_POSTGRES_PASSWORD:-pcapcaper}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./stuff/db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - pcapcaper_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Servizio Backend (FastAPI) ──────────────────────────────────────────
  backend:
    build:
      context: ./backend      # usa il Dockerfile in backend/
      dockerfile: Dockerfile
    container_name: pcapcaper-backend
    restart: unless-stopped

    # Espone la porta del backend all'host (utile per test diretti con curl/Postman)
    ports:
      - "8000:8000"

    # Variabili d'ambiente lette dal backend (opzionali — usano già i default)
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1   # disabilita il buffering di Python per i log in tempo reale

    # Storage temporaneo per upload PCAP. Docker lo elimina allo stop del container;
    # l'app cancella comunque ogni file alla fine della richiesta.
    tmpfs:
      - /tmp/pcapcaper:size=2g,mode=1777
    volumes:
      - analysis_reports:/data/pcapcaper/analyses

    # Connette il container alla rete interna
    networks:
      - pcapcaper_net

    depends_on:
      db:
        condition: service_healthy

    # Health-check: verifica che il backend risponda prima che il frontend parta
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s


  # ── Servizio Frontend (React + Nginx) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pcapcaper-frontend
    restart: unless-stopped

    # Porta dell'interfaccia web — aprire http://localhost:3000 nel browser
    ports:
      - "3000:80"

    # Il frontend dipende dal backend: Docker attende che il health-check passi
    depends_on:
      backend:
        condition: service_healthy

    networks:
      - pcapcaper_net


# ── Rete interna condivisa tra i due container ──────────────────────────
networks:
  pcapcaper_net:
    driver: bridge

volumes:
  analysis_reports:
  postgres_data:
